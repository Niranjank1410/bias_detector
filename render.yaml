services:
- type: web
  name: bias-detector-api
  runtime: python
  buildCommand: pip install -r requirements-api.txt
  startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
  envVars:
  - key: SUPABASE_URL
    sync: false
  - key: SUPABASE_SERVICE_KEY
    sync: false
  - key: NEWSAPI_KEY
    sync: false
  - key: TRANSFORMERS_OFFLINE
    value: "1"
  - key: HF_DATASETS_OFFLINE
    value: "1"
  - key: PYTHON_VERSION
    value: "3.11.0"